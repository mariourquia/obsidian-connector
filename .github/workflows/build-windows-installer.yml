name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.6.1)'
        required: false
        default: '0.6.1'
  push:
    tags:
      - 'v*'

jobs:
  build-exe:
    name: Build .exe installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Determine version
        id: version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ($env:EVENT_NAME -eq "push") {
            $ver = $env:REF_NAME -replace '^v', ''
          } else {
            $ver = $env:INPUT_VERSION
            if (-not $ver) { $ver = "0.6.1" }
          }
          if ($ver -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: $ver (expected X.Y.Z)"
            exit 1
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building installer for version: $ver"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: Create dist directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path dist -Force | Out-Null

      - name: Verify source layout for Inno Setup
        shell: pwsh
        run: |
          $required = @("src\skills", "src\hooks", "src\plugin", "obsidian_connector", "pyproject.toml")
          $missing = @()
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              $missing += $path
              Write-Host "MISSING: $path" -ForegroundColor Red
            } else {
              Write-Host "OK: $path" -ForegroundColor Green
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Required source files/dirs missing: $($missing -join ', ')"
            exit 1
          }

      - name: Compile installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "Inno Setup compiler not found at: $iscc"
            exit 1
          }
          $src = $env:GITHUB_WORKSPACE
          $ver = $env:APP_VERSION
          Write-Host "Compiling: ISCC /DSourceDir=$src /DAppVersion=$ver scripts\create-exe.iss"
          & $iscc "/DSourceDir=$src" "/DAppVersion=$ver" "scripts\create-exe.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed with exit code: $LASTEXITCODE"
            exit 1
          }

      - name: Verify output
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $exe = "dist\obsidian-connector-v$($env:APP_VERSION)-setup.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Expected output not found: $exe"
            Get-ChildItem dist\ -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $exe).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Installer built: $exe ($sizeMB MB)"

      - name: Generate SHA256 checksum
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $exe = "dist\obsidian-connector-v$($env:APP_VERSION)-setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $filename = Split-Path $exe -Leaf
          "$hash  $filename" | Out-File "dist\obsidian-connector-v$($env:APP_VERSION)-setup.exe.sha256" -Encoding ascii -NoNewline
          Write-Host "SHA256: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: obsidian-connector-windows-installer
          path: |
            dist/obsidian-connector-v${{ steps.version.outputs.VERSION }}-setup.exe
            dist/obsidian-connector-v${{ steps.version.outputs.VERSION }}-setup.exe.sha256
          retention-days: 30

      - name: Attach to GitHub Release
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $ver = $env:APP_VERSION
          $exe = "dist\obsidian-connector-v$ver-setup.exe"
          $sha = "dist\obsidian-connector-v$ver-setup.exe.sha256"
          # Try to upload -- may fail if release doesn't exist yet (created by parallel workflow)
          gh release upload "v$ver" $exe $sha --clobber 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Attached to release v$ver"
          } else {
            Write-Host "::warning::Could not attach to release v$ver -- upload artifacts are available as build artifacts"
            exit 0
          }
