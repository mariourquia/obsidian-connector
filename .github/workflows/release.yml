name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          pip install -e .
          # Run only CI-safe tests. Tests requiring Obsidian CLI (cache_test, escaping_test, thinking_deep_test)
          # are validated locally before release; Obsidian CLI unavailable in CI.
          python3 scripts/audit_test.py
          python3 scripts/graph_test.py
          python3 scripts/index_test.py
          python3 scripts/graduate_test.py
          python3 scripts/delegation_test.py

      - name: Build source archive
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="obsidian-connector-${TAG_NAME}/" HEAD -o "obsidian-connector-${TAG_NAME}.tar.gz"
          git archive --format=zip --prefix="obsidian-connector-${TAG_NAME}/" HEAD -o "obsidian-connector-${TAG_NAME}.zip"

      - name: Generate checksums for source archives
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          sha256sum "obsidian-connector-${TAG_NAME}.tar.gz" \
                    "obsidian-connector-${TAG_NAME}.zip" > "checksums.txt"
          cat checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            obsidian-connector-*.tar.gz
            obsidian-connector-*.zip
            checksums.txt

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS .dmg installer
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          bash scripts/create-dmg.sh "$TAG_NAME"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/obsidian-connector-*.dmg

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: cmd

      - name: Build Windows installer
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          .\scripts\build-windows-installer.ps1 -Version $env:TAG_NAME
        shell: pwsh

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/obsidian-connector-*-setup.exe

  create-release:
    needs: [build-artifacts, build-macos-dmg, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p final-assets
          cp release-assets/linux-artifacts/* final-assets/
          cp release-assets/macos-artifacts/* final-assets/
          cp release-assets/windows-artifacts/* final-assets/
          ls -lah final-assets/

      - name: Normalize Windows installer filename
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${TAG_NAME#v}"
          # Inno Setup outputs obsidian-connector-{version}-setup.exe
          # Rename to match release naming convention with tag prefix
          mv "final-assets/obsidian-connector-${CLEAN_VERSION}-setup.exe" \
             "final-assets/obsidian-connector-${TAG_NAME}-setup.exe"

      - name: Create full checksums
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          cd final-assets
          sha256sum obsidian-connector-${TAG_NAME}.tar.gz \
                    obsidian-connector-${TAG_NAME}.zip \
                    obsidian-connector-${TAG_NAME}.dmg \
                    obsidian-connector-${TAG_NAME}-setup.exe > obsidian-connector-${TAG_NAME}.sha256
          cat obsidian-connector-${TAG_NAME}.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets (keyless OIDC)
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd final-assets
          for f in "obsidian-connector-${TAG_NAME}.tar.gz" \
                   "obsidian-connector-${TAG_NAME}.zip" \
                   "obsidian-connector-${TAG_NAME}.dmg" \
                   "obsidian-connector-${TAG_NAME}-setup.exe" \
                   "obsidian-connector-${TAG_NAME}.sha256"; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert"
          done

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256.cert" \
            --title "$TAG_NAME" \
            --generate-notes \
            --draft
