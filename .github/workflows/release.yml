name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and test
        run: |
          pip install -e ".[dev]" pyyaml
          python3 scripts/audit_test.py
          python3 scripts/graph_test.py
          python3 scripts/index_test.py
          python3 scripts/graduate_test.py
          python3 scripts/delegation_test.py

      - name: Install build tools
        working-directory: tools
        run: npm ci

      - name: Build and validate targets
        run: |
          npx tsx tools/build.ts --target claude-code
          npx tsx tools/build.ts --target claude-desktop
          npx tsx tools/build.ts --target portable
          npx tsx tools/validate.ts --target claude-code
          npx tsx tools/validate.ts --target claude-desktop
          npx tsx tools/validate.ts --target portable
          python3 -m pytest tests/test_build_system.py -v

      - name: Package target archives
        run: |
          npx tsx tools/package.ts --target claude-code
          npx tsx tools/package.ts --target claude-desktop
          npx tsx tools/package.ts --target portable

      - name: Build source archive
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="obsidian-connector-${TAG_NAME}/" HEAD -o "dist/obsidian-connector-${TAG_NAME}.tar.gz"
          git archive --format=zip --prefix="obsidian-connector-${TAG_NAME}/" HEAD -o "dist/obsidian-connector-${TAG_NAME}.zip"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::warning::APPLE_CERTIFICATE_BASE64 not set -- building unsigned DMG"
            echo "SKIP_SIGN=true" >> "$GITHUB_ENV"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SKIP_SIGN=false" >> "$GITHUB_ENV"

      - name: Build macOS .dmg installer
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ "$SKIP_SIGN" = "true" ]; then
            bash scripts/create-dmg.sh "$TAG_NAME" --no-sign
          else
            bash scripts/create-dmg.sh "$TAG_NAME" --identity "$SIGN_IDENTITY"
          fi

      - name: Notarize and staple DMG
        if: env.SKIP_SIGN != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DMG_PATH="dist/obsidian-connector-${TAG_NAME}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify signed DMG
        if: env.SKIP_SIGN != 'true'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DMG_PATH="dist/obsidian-connector-${TAG_NAME}.dmg"
          spctl --assess --type open --context context:primary-signature "$DMG_PATH"
          codesign --verify --verbose "$DMG_PATH"
          echo "DMG is signed, notarized, and stapled"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: dist/obsidian-connector-*.dmg

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: cmd

      - name: Build Windows installer
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          .\scripts\build-windows-installer.ps1 -Version $env:TAG_NAME
        shell: pwsh

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: dist/obsidian-connector-*-setup.exe

  create-release:
    needs: [build-artifacts, build-macos-dmg, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p final-assets
          cp release-assets/linux-artifacts/* final-assets/
          cp release-assets/macos-artifacts/* final-assets/
          cp release-assets/windows-artifacts/* final-assets/
          ls -lah final-assets/

      - name: Normalize Windows installer filename
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${TAG_NAME#v}"
          mv "final-assets/obsidian-connector-${CLEAN_VERSION}-setup.exe" \
             "final-assets/obsidian-connector-${TAG_NAME}-setup.exe"

      - name: Create full checksums
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${TAG_NAME#v}"
          cd final-assets
          sha256sum obsidian-connector-${TAG_NAME}.tar.gz \
                    obsidian-connector-${TAG_NAME}.zip \
                    obsidian-connector-claude-code-v${CLEAN_VERSION}.zip \
                    obsidian-connector-desktop-v${CLEAN_VERSION}.zip \
                    obsidian-connector-portable-v${CLEAN_VERSION}.zip \
                    obsidian-connector-${TAG_NAME}.dmg \
                    obsidian-connector-${TAG_NAME}-setup.exe > obsidian-connector-${TAG_NAME}.sha256
          cat obsidian-connector-${TAG_NAME}.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets (keyless OIDC)
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CLEAN_VERSION="${TAG_NAME#v}"
          cd final-assets
          for f in "obsidian-connector-${TAG_NAME}.tar.gz" \
                   "obsidian-connector-${TAG_NAME}.zip" \
                   "obsidian-connector-claude-code-v${CLEAN_VERSION}.zip" \
                   "obsidian-connector-desktop-v${CLEAN_VERSION}.zip" \
                   "obsidian-connector-portable-v${CLEAN_VERSION}.zip" \
                   "obsidian-connector-${TAG_NAME}.dmg" \
                   "obsidian-connector-${TAG_NAME}-setup.exe" \
                   "obsidian-connector-${TAG_NAME}.sha256"; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert"
          done

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CLEAN_VERSION="${TAG_NAME#v}"
          gh release create "$TAG_NAME" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip" \
            "final-assets/obsidian-connector-claude-code-v${CLEAN_VERSION}.zip" \
            "final-assets/obsidian-connector-desktop-v${CLEAN_VERSION}.zip" \
            "final-assets/obsidian-connector-portable-v${CLEAN_VERSION}.zip" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.tar.gz.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.zip.cert" \
            "final-assets/obsidian-connector-claude-code-v${CLEAN_VERSION}.zip.sig" \
            "final-assets/obsidian-connector-claude-code-v${CLEAN_VERSION}.zip.cert" \
            "final-assets/obsidian-connector-desktop-v${CLEAN_VERSION}.zip.sig" \
            "final-assets/obsidian-connector-desktop-v${CLEAN_VERSION}.zip.cert" \
            "final-assets/obsidian-connector-portable-v${CLEAN_VERSION}.zip.sig" \
            "final-assets/obsidian-connector-portable-v${CLEAN_VERSION}.zip.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.dmg.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}-setup.exe.cert" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256.sig" \
            "final-assets/obsidian-connector-${TAG_NAME}.sha256.cert" \
            --title "$TAG_NAME" \
            --generate-notes \

